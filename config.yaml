# 任务调度服务配置(统一 worker 派发模型)
# 敏感配置(mysql dsn)推荐用环境变量覆盖,见文末「环境变量」表。管理员账户走数据库表。

server:
  port: 8080
  mode: debug            # gin 模式: debug / release / test。release 要求显式配置 auth.login.max_attempts_per_min
  max_request_body_mb: 2 # 请求体大小上限(MB)

database:
  driver: sqlite         # sqlite | mysql(生产高负载建议 mysql)
  sqlite:
    path: ./data/tp-job.db
    max_open_conns: 8  # 连接池上限;WAL 下读并发、写串行(busy_timeout 排队)。写是单写者,开太大只增排队无收益
  mysql:
    # 示例值:生产请改用最小权限账号 + 强密码,或用环境变量 TP_JOB_MYSQL_DSN 注入。
    dsn: "<user>:<password>@tcp(127.0.0.1:3306)/tp_job?charset=utf8mb4&parseTime=True&loc=Local"
    max_open_conns: 50
    max_idle_conns: 10

log:
  level: info            # debug / info / warn / error
  dir: ./logs            # 实例日志亦落此目录:{dir}/instances/{appID}/{instanceID}_{rootInstanceID}.log
  file_name: tp-job.log
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  instance_retention_days: 90  # 实例日志保留天数(按文件 mtime 清理);0=用默认 90;-1=不清理

scheduler:
  interval_ms: 1000   # 调度/reaper/retry/callback pump 扫描间隔(毫秒)
  # 实例状态变更回调:Job 配 callback_url 时,实例每次状态变化 POST 通知,至少一次。
  # callback URL 可信性靠部署侧网络隔离(同 /server/*、/worker/*);禁重定向防 302 诱导。
  callback:
    enabled: true
    max_attempts: 8
    backoff_base_sec: 10
    backoff_max_sec: 3600
    timeout_sec: 10
    retention_days: 7

worker:
  timeout_seconds: 600   # worker 心跳超时(秒),超过视为离线(reaper 据此失败转移)。默认 10 分钟
  warmup_seconds: 30     # reaper 启动宽限:窗口内跳过"worker 失联"判定,给重启后 worker 重新心跳注册留时间(避免误杀重启前在飞的实例)。默认 30s(≥ 典型 10s 心跳 + 余量)

powerjob:
  # /server/* 始终挂载(标准 PowerJob Java worker 不改源码接入)。⚠ /server/*、/worker/* 无鉴权,
  # 生产必须通过网络隔离保护(见 README):任何人可注册任意 worker 地址 → 到期 job 主动 POST 该地址(SSRF)。
  server_address: "127.0.0.1:8080"   # /server/acquire 返回值;必须是 PowerJob Worker 可达的 host:port

auth:
  # 管理员账户存 admin_user 表(首次启动自动 seed 默认账户 admin/admin123),
  # 用户名与密码均可在 Web 顶部「账户设置」菜单修改。此处不再支持配置文件/环境变量注入。
  session:
    ttl_seconds: 86400   # 登录会话有效期(秒)
  # 登录限流(防爆破 + bcrypt 资源放大 DoS)。每 IP 每分钟最大尝试次数;0=不限(开发默认)。
  # 生产建议设 10~20。release 模式强制要求显式配置(<=0 启动被拒)。
  # login:
  #   max_attempts_per_min: 10

# pprof 诊断端点(net/http/pprof,独立 listener,主服务卡死时仍可抓 goroutine 栈定位)。默认关闭。
# 排查死锁/阻塞时改 enabled: true。⚠ 无鉴权:listen 用 0.0.0.0 会暴露给可达网络(可读栈/堆),
# 仅本机(127.0.0.1)或可信网络启用。
pprof:
  enabled: false              # 默认关;诊断时改 true
  listen: "127.0.0.1:6060"    # 抓栈地址;本机留 127.0.0.1,远程抓栈改 0.0.0.0:6060(⚠ 仅可信网络)

# 调试便利开关(仅本地/开发;生产 release 配置须全部关闭)。未配置=安全默认(关闭)。
debug:
  auto_login: true   # 前端无 token 时匿名用默认账户 admin/admin123 自动登录(免开发手输)。生产必须 false

# 环境变量(优先级高于本文件,便于容器/CI 注入,避免明文落盘):
#   TP_JOB_DB_DRIVER               → database.driver (sqlite|mysql)
#   TP_JOB_MYSQL_DSN               → database.mysql.dsn
#   TP_JOB_POWERJOB_SERVER_ADDRESS → powerjob.server_address
# 注:server.mode 不支持 env 覆盖(防降级绕过 release 限流强制),仅由本文件决定;部署需 release 用 config.release.yaml。
#     管理员账户已迁入数据库(admin_user 表),不再支持环境变量注入;默认 admin/admin123,Web 可改。
