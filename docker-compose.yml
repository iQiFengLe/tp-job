services:
  tp-job:
    build: .
    image: tp-job:latest
    container_name: tp-job
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TP_JOB_DB_DRIVER: sqlite
      TZ: Asia/Shanghai
      # TP_JOB_MYSQL_DSN: "user:pass@tcp(mysql:3306)/tp-job?charset=utf8mb4&parseTime=True&loc=Local"
      # ⚠ 容器化部署:必须是 PowerJob Worker 可达地址,绝不能用 127.0.0.1(那是容器自身)
      # TP_JOB_POWERJOB_SERVER_ADDRESS: "tp-job:8080"
    # 生产用 release 配置(config.release.yaml:mode=release + 登录限流)。
    # server.mode 不支持 env 覆盖(防降级绕过 release 限流强制),故通过指定配置文件设 release。
    # 管理员账户:首次启动 seed admin/admin123,登录后立即 Web 改密。
    command: ["-config", "config.release.yaml"]
    volumes:
      - ./data:/app/data   # sqlite 数据持久化(切 mysql 后可移除)
      - ./logs:/app/logs   # 日志 + 实例日志持久化
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ── 可选:MySQL(高负载生产建议替换 sqlite)──
