# 任务调度服务配置 — 生产 release 模式
# 与 config.yaml 的差异:server.mode=release + 显式登录限流。
# server.mode 不支持 env 覆盖(防降级绕过 release 限流强制),故 docker-compose 通过指定本文件启动。
# 管理员账户:首次启动 seed admin/admin123,登录后立即在 Web「账户设置」改密。

server:
  port: 8080
  mode: release          # release:关闭 gin 敏感路由日志 + 强制登录限流
  max_request_body_mb: 2

database:
  driver: sqlite         # sqlite | mysql(生产高负载建议 mysql)
  sqlite:
    path: ./data/dida.db
  mysql:
    # 生产请用最小权限账号 + 强密码,或环境变量 DIDA_MYSQL_DSN 注入。
    dsn: "<user>:<password>@tcp(127.0.0.1:3306)/dida?charset=utf8mb4&parseTime=True&loc=Local"
    max_open_conns: 50
    max_idle_conns: 10

log:
  level: info
  dir: ./logs
  file_name: dida.log
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  instance_retention_days: 90

scheduler:
  interval_ms: 1000
  callback:
    enabled: true
    max_attempts: 8
    backoff_base_sec: 10
    backoff_max_sec: 3600
    timeout_sec: 10
    retention_days: 7

worker:
  timeout_seconds: 600
  warmup_seconds: 30   # reaper 启动宽限(避免重启误杀在飞实例);默认 30s

powerjob:
  # ⚠ 容器化部署必须是 worker 可达地址,绝不能用 127.0.0.1(那是容器自身);如 "dida:8080"
  server_address: "127.0.0.1:8080"

auth:
  session:
    ttl_seconds: 86400
  login:
    max_attempts_per_min: 10   # release 强制要求(防爆破 + bcrypt DoS)

# pprof 诊断端点(默认关闭)。排查卡死/死锁时改 enabled: true。
# ⚠ 无鉴权:仅本机(127.0.0.1)或可信网络启用;0.0.0.0 会暴露栈/堆 profile 给可达网络。
pprof:
  enabled: false
  listen: "127.0.0.1:6060"

# 调试便利开关:生产必须全部关闭(未配置=关闭,此处显式 false 表态)。
debug:
  auto_login: false   # 生产关闭前端自动登录,任何人必须经登录页手输凭据

# 环境变量(优先级高于本文件):DIDA_DB_DRIVER / DIDA_MYSQL_DSN / DIDA_POWERJOB_SERVER_ADDRESS
# server.mode 不支持 env 覆盖。
